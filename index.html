<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragon Curve Fractal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="controls">
    <h1>🐉 Dragon Curve Fractal</h1>

    <div class="control-group">
      <label for="iterations">Iterations: <span id="iter-val">14</span></label>
      <input type="range" id="iterations" min="1" max="20" value="14" step="1">
    </div>

    <div class="control-group">
      <label for="speed">Draw Speed: <span id="speed-val">Fast</span></label>
      <input type="range" id="speed" min="1" max="5" value="4" step="1">
    </div>

    <div class="control-group">
      <label for="color-scheme">Color Scheme</label>
      <select id="color-scheme">
        <option value="aurora">Aurora</option>
        <option value="fire">Fire</option>
        <option value="ocean">Ocean</option>
        <option value="rainbow">Rainbow</option>
        <option value="neon">Neon</option>
        <option value="monochrome">Monochrome</option>
      </select>
    </div>

    <div class="control-group">
      <label for="line-width">Line Width: <span id="lw-val">1.5</span></label>
      <input type="range" id="line-width" min="0.5" max="4" value="1.5" step="0.5">
    </div>

    <div class="buttons">
      <button id="draw-btn" class="btn primary">▶ Draw</button>
      <button id="reset-btn" class="btn secondary">↺ Reset</button>
      <button id="auto-btn" class="btn secondary">🔄 Animate</button>
    </div>

    <div class="info">
      <span id="segments">Segments: 0</span>
      <span id="progress"></span>
    </div>
  </div>

  <script src="dragon.js"></script>
</body>
</html>
