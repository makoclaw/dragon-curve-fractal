<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Curve Fractal Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* ── Main layout: side-by-side ── */
  .app {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 16px;
    max-width: 1400px;
    width: 100%;
    height: 100vh;
  }

  /* ── Sidebar (Pattern + Controls) ── */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .panel {
    background: rgba(18, 18, 26, 0.9);
    backdrop-filter: blur(12px);
    border: 1px solid #1e1e30;
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: 0 0 30px rgba(83, 109, 254, 0.06);
  }

  .panel h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #536dfe;
    margin-bottom: 12px;
    font-weight: 700;
  }

  /* ── Header / Title ── */
  .title-block { text-align: center; }
  .title-block h1 {
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-weight: 700;
    background: linear-gradient(135deg, #64ffda, #536dfe, #ff6ec7);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite;
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .subtitle { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .stats {
    font-size: 0.75rem;
    color: #aaa;
    margin-top: 6px;
    font-family: 'Courier New', monospace;
  }
  .stats span { color: #64ffda; font-weight: 600; }

  /* ── Pattern Editor ── */
  .pe-section { margin-bottom: 12px; }
  .pe-section:last-child { margin-bottom: 0; }
  .pe-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    margin-bottom: 6px;
    display: block;
  }
  .pe-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .pe-angle-val {
    font-size: 0.9rem;
    font-weight: 600;
    color: #64ffda;
    font-family: 'Courier New', monospace;
    min-width: 40px;
    text-align: center;
  }
  .pe-seq-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: wrap;
  }
  .pe-turn {
    width: 38px;
    height: 34px;
    border: none;
    border-radius: 7px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
  }
  .pe-turn.right {
    background: rgba(255, 110, 199, 0.15);
    color: #ff6ec7;
    border: 1px solid rgba(255, 110, 199, 0.3);
  }
  .pe-turn.right:hover { background: rgba(255, 110, 199, 0.25); }
  .pe-turn.left {
    background: rgba(100, 255, 218, 0.15);
    color: #64ffda;
    border: 1px solid rgba(100, 255, 218, 0.3);
  }
  .pe-turn.left:hover { background: rgba(100, 255, 218, 0.25); }
  .pe-add, .pe-remove {
    width: 34px;
    height: 34px;
    border-radius: 7px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid #2a2a40;
    background: #1e1e30;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .pe-add:hover { background: #2a2a40; border-color: #536dfe; }
  .pe-remove:hover { background: #2a2a40; border-color: #ff6ec7; }
  .pe-presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .pe-preset {
    padding: 5px 10px;
    border-radius: 7px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid #1e1e30;
    background: #12121a;
    color: #e0e0e0;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pe-preset:hover { background: #1e1e30; border-color: #536dfe; }

  /* ── Preview ── */
  .pe-preview-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #previewCanvas {
    border: 1px solid #1e1e30;
    border-radius: 8px;
    background: #0a0a0f;
    width: 100%;
    height: auto;
  }
  .pe-preview-info {
    font-size: 0.7rem;
    color: #666;
    line-height: 1.5;
  }
  .pe-preview-info .pe-detail {
    color: #aaa;
    font-family: 'Courier New', monospace;
  }

  /* ── Main canvas area ── */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 0;
  }
  #canvas-wrap {
    position: relative;
    border: 1px solid #1a1a2e;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(84, 110, 254, 0.08);
  }
  canvas#canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ── Bottom controls ── */
  .controls-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    padding: 10px 0 0;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: rgba(18, 18, 26, 0.9);
    padding: 8px 12px;
    border-radius: 10px;
    border: 1px solid #1e1e30;
    min-width: 100px;
  }
  .control-group label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100px;
    height: 5px;
    border-radius: 3px;
    background: #1e1e30;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #536dfe;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(83, 109, 254, 0.4);
  }
  input[type="color"] {
    -webkit-appearance: none;
    width: 36px;
    height: 28px;
    border: 2px solid #1e1e30;
    border-radius: 7px;
    cursor: pointer;
    background: none;
    padding: 2px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
  .val {
    font-size: 0.85rem;
    font-weight: 600;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
  }

  /* ── Buttons ── */
  button.ctrl-btn {
    padding: 8px 18px;
    border: none;
    border-radius: 9px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  #patternToggle {
    background: #1e1e30;
    color: #e0e0e0;
    border: 1px solid #2a2a40;
  }
  #patternToggle.active {
    background: rgba(83, 109, 254, 0.2);
    border-color: #536dfe;
    color: #536dfe;
  }
  #patternToggle:hover { background: #2a2a40; }
  #drawBtn {
    background: linear-gradient(135deg, #536dfe, #64ffda);
    color: #0a0a0f;
  }
  #drawBtn:hover { transform: scale(1.04); box-shadow: 0 0 16px rgba(83, 109, 254, 0.3); }
  #drawBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  #resetBtn {
    background: #1e1e30;
    color: #e0e0e0;
    border: 1px solid #2a2a40;
  }
  #resetBtn:hover { background: #2a2a40; }

  /* ── Progress ── */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: #12121a;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #536dfe, #64ffda);
    transition: width 0.1s linear;
  }

  /* ── Responsive ── */
  @media (max-width: 800px) {
    .app {
      flex-direction: column;
      align-items: stretch;
      overflow-y: auto;
      height: auto;
      min-height: 100vh;
    }
    .sidebar {
      width: 100%;
      max-height: none;
      flex-direction: row;
      flex-wrap: wrap;
    }
    .sidebar .panel { flex: 1; min-width: 260px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Title -->
    <div class="panel title-block">
      <h1>Dragon Curve Fractal</h1>
      <p class="subtitle">Explore self-similar beauty</p>
      <div class="stats">
        Iter: <span id="iterDisplay">0</span> ·
        Segs: <span id="segDisplay">0</span> ·
        Angle: <span id="angleDisplay">90</span>°
      </div>
    </div>

    <!-- Pattern Editor -->
    <div class="panel" id="patternPanel" style="display:none;">
      <h2>⚙ Pattern Mode</h2>

      <!-- Fold Angle -->
      <div class="pe-section">
        <span class="pe-label">Fold Angle</span>
        <div class="pe-row">
          <input type="range" id="angleSlider" min="1" max="179" value="90" style="flex:1; min-width: 120px;">
          <span class="pe-angle-val" id="angleVal">90°</span>
        </div>
      </div>

      <!-- Turn Sequence -->
      <div class="pe-section">
        <span class="pe-label">Turn Sequence</span>
        <div class="pe-seq-wrap" id="turnSeqWrap"></div>
      </div>

      <!-- Presets -->
      <div class="pe-section">
        <span class="pe-label">Presets</span>
        <div class="pe-presets" id="presetsRow"></div>
      </div>

      <!-- Preview -->
      <div class="pe-section">
        <div class="pe-preview-area">
          <canvas id="previewCanvas" width="264" height="176"></canvas>
          <div class="pe-preview-info">
            <div class="pe-detail" id="previewDetail">Angle: 90° | Seq: [R]</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main area -->
  <div class="main-area">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
    <div class="controls-row">
      <div class="control-group">
        <label>Iterations</label>
        <input type="range" id="iterSlider" min="1" max="20" value="10">
        <div class="val" id="iterVal">10</div>
      </div>
      <div class="control-group">
        <label>Speed</label>
        <input type="range" id="speedSlider" min="1" max="50" value="15">
        <div class="val" id="speedVal">15</div>
      </div>
      <div class="control-group">
        <label>Color</label>
        <input type="color" id="colorPicker" value="#64ffda">
      </div>
      <div class="control-group" style="flex-direction:row; gap:8px; align-self:flex-end;">
        <button class="ctrl-btn" id="patternToggle">⚙ Pattern</button>
        <button class="ctrl-btn" id="drawBtn">▶ Draw</button>
        <button class="ctrl-btn" id="resetBtn">↺ Reset</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  const iterSlider = document.getElementById('iterSlider');
  const speedSlider = document.getElementById('speedSlider');
  const colorPicker = document.getElementById('colorPicker');
  const iterVal = document.getElementById('iterVal');
  const speedVal = document.getElementById('speedVal');
  const iterDisplay = document.getElementById('iterDisplay');
  const segDisplay = document.getElementById('segDisplay');
  const angleDisplay = document.getElementById('angleDisplay');
  const progressFill = document.getElementById('progressFill');
  const drawBtn = document.getElementById('drawBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Pattern editor
  const patternPanel = document.getElementById('patternPanel');
  const patternToggle = document.getElementById('patternToggle');
  const angleSlider = document.getElementById('angleSlider');
  const angleVal = document.getElementById('angleVal');
  const turnSeqWrap = document.getElementById('turnSeqWrap');
  const presetsRow = document.getElementById('presetsRow');
  const previewCanvas = document.getElementById('previewCanvas');
  const previewCtx = previewCanvas.getContext('2d');
  const previewDetail = document.getElementById('previewDetail');

  let animId = null;
  let turns = [];
  let fullSegments = [];

  // Pattern state
  let patternMode = false;
  let foldAngle = 90;
  let baseTurns = [1]; // 1=right, -1=left

  const presets = [
    { name: '🐉 Dragon', angle: 90, turns: [1] },
    { name: '🌿 Fern', angle: 60, turns: [1, -1] },
    { name: '❄️ Snowflake', angle: 120, turns: [1] },
    { name: '🔀 Zigzag', angle: 90, turns: [1, 1, -1] },
  ];

  function resizeCanvas() {
    const mainArea = document.querySelector('.main-area');
    const controlsRow = document.querySelector('.controls-row');
    const availW = mainArea.clientWidth - 20;
    const availH = mainArea.clientHeight - controlsRow.offsetHeight - 40;
    const size = Math.min(availW, availH, 900);
    const w = Math.max(400, size);
    const h = Math.max(300, Math.round(w * 0.75));
    canvas.width = w * 2;
    canvas.height = h * 2;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    wrap.style.width = w + 'px';
  }

  function computeTurns(n, baseSeq, angle) {
    const t = [];
    for (let i = 0; i < n; i++) {
      const prev = t.slice();
      const foldTurn = baseSeq[i % baseSeq.length];
      t.push(foldTurn);
      for (let j = prev.length - 1; j >= 0; j--) t.push(-prev[j]);
    }
    return t;
  }

  function computeSegments(turnsArr, angleDeg) {
    const segs = [];
    let x = 0, y = 0;
    let angle = 0;
    const rad = angleDeg * Math.PI / 180;
    let x2 = x + 1, y2 = y;
    segs.push({ x1: x, y1: y, x2, y2 });
    x = x2; y = y2;
    for (const turn of turnsArr) {
      angle += turn * rad;
      x2 = x + Math.cos(angle);
      y2 = y + Math.sin(angle);
      segs.push({ x1: x, y1: y, x2, y2 });
      x = x2; y = y2;
    }
    return segs;
  }

  function getBounds(segs) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const s of segs) {
      if (s.x1 < minX) minX = s.x1;
      if (s.y1 < minY) minY = s.y1;
      if (s.x2 < minX) minX = s.x2;
      if (s.y2 < minY) minY = s.y2;
      if (s.x1 > maxX) maxX = s.x1;
      if (s.y1 > maxY) maxY = s.y1;
      if (s.x2 > maxX) maxX = s.x2;
      if (s.y2 > maxY) maxY = s.y2;
    }
    return { minX, minY, maxX, maxY };
  }

  function hexToRgb(hex) {
    return {
      r: parseInt(hex.slice(1, 3), 16),
      g: parseInt(hex.slice(3, 5), 16),
      b: parseInt(hex.slice(5, 7), 16),
    };
  }

  function clear() {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBtn.disabled = false;
    progressFill.style.width = '0%';
  }

  // Auto-redraw: compute + draw final result instantly (no animation)
  function autoRedraw() {
    clear();
    const iter = parseInt(iterSlider.value);
    const color = colorPicker.value;
    const angle = patternMode ? foldAngle : 90;
    const baseSeq = patternMode ? baseTurns : [1];

    turns = computeTurns(iter, baseSeq, angle);
    fullSegments = computeSegments(turns, angle);
    angleDisplay.textContent = angle;
    segDisplay.textContent = fullSegments.length.toLocaleString();
    iterDisplay.textContent = turns.length;
    progressFill.style.width = '100%';

    const b = getBounds(fullSegments);
    const pad = 20;
    const w = canvas.width - pad * 2;
    const h = canvas.height - pad * 2;
    const rangeX = b.maxX - b.minX || 1;
    const rangeY = b.maxY - b.minY || 1;
    const scale = Math.min(w / rangeX, h / rangeY);
    const offX = pad + (w - rangeX * scale) / 2 - b.minX * scale;
    const offY = pad + (h - rangeY * scale) / 2 - b.minY * scale;
    const rgb = hexToRgb(color);

    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, scale * 0.4);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = `rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`;
    ctx.shadowBlur = 4;

    ctx.beginPath();
    for (const s of fullSegments) {
      ctx.moveTo(s.x1 * scale + offX, s.y1 * scale + offY);
      ctx.lineTo(s.x2 * scale + offX, s.y2 * scale + offY);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function animateDraw(segs, color, speed) {
    clear();
    const b = getBounds(segs);
    const pad = 20;
    const w = canvas.width - pad * 2;
    const h = canvas.height - pad * 2;
    const rangeX = b.maxX - b.minX || 1;
    const rangeY = b.maxY - b.minY || 1;
    const scale = Math.min(w / rangeX, h / rangeY);
    const offX = pad + (w - rangeX * scale) / 2 - b.minX * scale;
    const offY = pad + (h - rangeY * scale) / 2 - b.minY * scale;
    const rgb = hexToRgb(color);

    const total = segs.length;
    const segsPerFrame = Math.max(1, Math.round(speed * (total / 500)));
    let idx = 0;

    ctx.lineWidth = Math.max(1, scale * 0.4);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function frame() {
      const end = Math.min(idx + segsPerFrame, total);

      if (idx > 0) {
        ctx.shadowBlur = 0;
        ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.3)`;
        ctx.beginPath();
        for (let i = 0; i < idx; i++) {
          const s = segs[i];
          ctx.moveTo(s.x1 * scale + offX, s.y1 * scale + offY);
          ctx.lineTo(s.x2 * scale + offX, s.y2 * scale + offY);
        }
        ctx.stroke();
      }

      ctx.shadowColor = `rgba(${rgb.r},${rgb.g},${rgb.b},0.7)`;
      ctx.shadowBlur = 8;
      ctx.strokeStyle = color;
      ctx.beginPath();
      for (let i = idx; i < end; i++) {
        const s = segs[i];
        ctx.moveTo(s.x1 * scale + offX, s.y1 * scale + offY);
        ctx.lineTo(s.x2 * scale + offX, s.y2 * scale + offY);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      if (end < total) {
        const tip = segs[end - 1] || segs[0];
        const cx = tip.x2 * scale + offX;
        const cy = tip.y2 * scale + offY;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 12);
        grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.8)`);
        grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, 12, 0, Math.PI * 2);
        ctx.fill();
      }

      idx = end;
      iterDisplay.textContent = Math.min(turns.length, Math.floor((idx / total) * turns.length));
      segDisplay.textContent = idx.toLocaleString();
      progressFill.style.width = ((idx / total) * 100).toFixed(1) + '%';

      if (idx < total) {
        animId = requestAnimationFrame(frame);
      } else {
        iterDisplay.textContent = turns.length;
        drawBtn.disabled = false;
        progressFill.style.width = '100%';
      }
    }

    drawBtn.disabled = true;
    animId = requestAnimationFrame(frame);
  }

  // ── Preview ──
  function drawPreview(angle, turns) {
    const segs = computeSegments(computeTurns(4, turns, angle), angle);
    const b = getBounds(segs);
    const pad = 10;
    const w = previewCanvas.width - pad * 2;
    const h = previewCanvas.height - pad * 2;
    const rangeX = b.maxX - b.minX || 1;
    const rangeY = b.maxY - b.minY || 1;
    const scale = Math.min(w / rangeX, h / rangeY);
    const offX = pad + (w - rangeX * scale) / 2 - b.minX * scale;
    const offY = pad + (h - rangeY * scale) / 2 - b.minY * scale;

    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    previewCtx.strokeStyle = '#64ffda';
    previewCtx.lineWidth = Math.max(0.8, scale * 0.35);
    previewCtx.lineCap = 'round';
    previewCtx.lineJoin = 'round';

    previewCtx.beginPath();
    for (const s of segs) {
      previewCtx.moveTo(s.x1 * scale + offX, s.y1 * scale + offY);
      previewCtx.lineTo(s.x2 * scale + offX, s.y2 * scale + offY);
    }
    previewCtx.stroke();

    previewDetail.textContent = `Angle: ${angle}° | Seq: [${turns.map(t => t === 1 ? 'R' : 'L').join(', ')}]`;
  }

  // ── Turn sequence ──
  function renderTurnSequence() {
    turnSeqWrap.innerHTML = '';
    baseTurns.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.className = 'pe-turn ' + (t === 1 ? 'right' : 'left');
      btn.textContent = t === 1 ? 'R' : 'L';
      btn.addEventListener('click', () => {
        baseTurns[i] = baseTurns[i] === 1 ? -1 : 1;
        renderTurnSequence();
        updatePreview();
        autoRedraw();
      });
      turnSeqWrap.appendChild(btn);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'pe-add';
    addBtn.textContent = '+';
    addBtn.addEventListener('click', () => {
      baseTurns.push(1);
      renderTurnSequence();
      updatePreview();
      autoRedraw();
    });
    turnSeqWrap.appendChild(addBtn);

    if (baseTurns.length > 1) {
      const removeBtn = document.createElement('button');
      removeBtn.className = 'pe-remove';
      removeBtn.textContent = '−';
      removeBtn.addEventListener('click', () => {
        baseTurns.pop();
        renderTurnSequence();
        updatePreview();
        autoRedraw();
      });
      turnSeqWrap.appendChild(removeBtn);
    }
  }

  // ── Presets ──
  function renderPresets() {
    presetsRow.innerHTML = '';
    presets.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'pe-preset';
      btn.textContent = p.name;
      btn.addEventListener('click', () => {
        foldAngle = p.angle;
        baseTurns = p.turns.slice();
        angleSlider.value = foldAngle;
        angleVal.textContent = foldAngle + '°';
        renderTurnSequence();
        updatePreview();
        autoRedraw();
      });
      presetsRow.appendChild(btn);
    });
  }

  function updatePreview() {
    drawPreview(foldAngle, baseTurns);
  }

  // ── Pattern toggle ──
  patternToggle.addEventListener('click', () => {
    patternMode = !patternMode;
    patternPanel.style.display = patternMode ? 'block' : 'none';
    patternToggle.classList.toggle('active', patternMode);
    if (!patternMode) {
      foldAngle = 90;
      baseTurns = [1];
      angleSlider.value = 90;
      angleVal.textContent = '90°';
      renderTurnSequence();
      updatePreview();
    }
    resizeCanvas();
  });

  // ── Angle slider (auto-redraw, debounced) ──
  let redrawTimer = null;
  angleSlider.addEventListener('input', () => {
    foldAngle = parseInt(angleSlider.value);
    angleVal.textContent = foldAngle + '°';
    updatePreview();
    clearTimeout(redrawTimer);
    redrawTimer = setTimeout(() => autoRedraw(), 200);
  });

  // ── Auto-redraw on main slider/color changes too ──
  iterSlider.addEventListener('change', () => { autoRedraw(); });
  colorPicker.addEventListener('input', () => { autoRedraw(); });

  // ── Init ──
  renderTurnSequence();
  renderPresets();
  updatePreview();

  // ── Draw (uses current pattern settings when in pattern mode) ──
  function start() {
    const iter = parseInt(iterSlider.value);
    const speed = parseInt(speedSlider.value);
    const color = colorPicker.value;
    const angle = patternMode ? foldAngle : 90;
    const baseSeq = patternMode ? baseTurns : [1];

    clear();
    turns = computeTurns(iter, baseSeq, angle);
    fullSegments = computeSegments(turns, angle);

    angleDisplay.textContent = angle;
    segDisplay.textContent = '0';
    iterDisplay.textContent = '0';
    progressFill.style.width = '0%';

    animateDraw(fullSegments, color, speed);
  }

  iterSlider.addEventListener('input', () => { iterVal.textContent = iterSlider.value; });
  speedSlider.addEventListener('input', () => { speedVal.textContent = speedSlider.value; });
  drawBtn.addEventListener('click', start);
  resetBtn.addEventListener('click', () => {
    clear();
    iterDisplay.textContent = '0';
    segDisplay.textContent = '0';
    angleDisplay.textContent = patternMode ? foldAngle : '90';
  });

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
})();
</script>
</body>
</html>
