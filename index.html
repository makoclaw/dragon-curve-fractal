<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Curve Fractal Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  header {
    text-align: center;
    padding: 20px 16px 10px;
    width: 100%;
  }
  h1 {
    font-size: clamp(1.3rem, 4vw, 2.2rem);
    font-weight: 700;
    background: linear-gradient(135deg, #64ffda, #536dfe, #ff6ec7);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite;
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .subtitle { font-size: 0.85rem; color: #888; margin-top: 4px; }
  .stats {
    font-size: 0.8rem;
    color: #aaa;
    margin-top: 6px;
    font-family: 'Courier New', monospace;
  }
  .stats span { color: #64ffda; font-weight: 600; }

  /* ── Content area: side-by-side on desktop ── */
  .content {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
    gap: 16px;
    margin: 8px auto;
    width: 100%;
    max-width: 1100px;
    padding: 0 8px;
  }

  /* ── Pattern Editor ── */
  #patternPanel {
    width: 260px;
    flex-shrink: 0;
    padding: 14px 16px;
    background: rgba(18, 18, 26, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid #1e1e30;
    border-radius: 14px;
    box-shadow: 0 0 30px rgba(83, 109, 254, 0.06);
    display: none;
  }
  #patternPanel.visible { display: block; }

  .pe-section { margin-bottom: 12px; }
  .pe-section:last-child { margin-bottom: 0; }
  .pe-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    margin-bottom: 6px;
    display: block;
  }
  .pe-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .pe-angle-val {
    font-size: 0.9rem;
    font-weight: 600;
    color: #64ffda;
    font-family: 'Courier New', monospace;
    min-width: 40px;
    text-align: center;
  }
  .pe-seq-wrap { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .pe-turn {
    width: 38px; height: 34px;
    border: none; border-radius: 7px;
    font-size: 0.8rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace;
  }
  .pe-turn.right {
    background: rgba(255, 110, 199, 0.15);
    color: #ff6ec7;
    border: 1px solid rgba(255, 110, 199, 0.3);
  }
  .pe-turn.right:hover { background: rgba(255, 110, 199, 0.25); }
  .pe-turn.left {
    background: rgba(100, 255, 218, 0.15);
    color: #64ffda;
    border: 1px solid rgba(100, 255, 218, 0.3);
  }
  .pe-turn.left:hover { background: rgba(100, 255, 218, 0.25); }
  .pe-add, .pe-remove {
    width: 34px; height: 34px;
    border-radius: 7px; font-size: 1rem; font-weight: 700;
    cursor: pointer;
    border: 1px solid #2a2a40; background: #1e1e30; color: #e0e0e0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .pe-add:hover { background: #2a2a40; border-color: #536dfe; }
  .pe-remove:hover { background: #2a2a40; border-color: #ff6ec7; }
  .pe-presets { display: flex; gap: 6px; flex-wrap: wrap; }
  .pe-preset {
    padding: 5px 10px; border-radius: 7px;
    font-size: 0.75rem; font-weight: 600; cursor: pointer;
    border: 1px solid #1e1e30; background: #12121a; color: #e0e0e0;
    transition: all 0.15s; white-space: nowrap;
  }
  .pe-preset:hover { background: #1e1e30; border-color: #536dfe; }
  .pe-preview-area { display: flex; flex-direction: column; gap: 6px; }
  #previewCanvas {
    border: 1px solid #1e1e30; border-radius: 8px;
    background: #0a0a0f; width: 100%; height: auto;
  }
  .pe-preview-info { font-size: 0.7rem; color: #666; line-height: 1.5; }
  .pe-preview-info .pe-detail { color: #aaa; font-family: 'Courier New', monospace; }

  /* ── Canvas area ── */
  #canvas-wrap {
    position: relative;
    border: 1px solid #1a1a2e;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(84, 110, 254, 0.08);
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas#mainCanvas {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ── Bottom controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    padding: 12px 16px 24px;
    max-width: 700px;
    width: 100%;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: #12121a;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #1e1e30;
    min-width: 120px;
  }
  label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 120px; height: 6px;
    border-radius: 3px; background: #1e1e30; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%; background: #536dfe; cursor: pointer;
    box-shadow: 0 0 8px rgba(83, 109, 254, 0.4);
  }
  input[type="color"] {
    -webkit-appearance: none;
    width: 40px; height: 32px;
    border: 2px solid #1e1e30; border-radius: 8px;
    cursor: pointer; background: none; padding: 2px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }
  .val {
    font-size: 0.85rem; font-weight: 600; color: #e0e0e0;
    font-family: 'Courier New', monospace;
  }
  button {
    padding: 10px 24px; border: none; border-radius: 10px;
    font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  #patternToggle {
    background: #1e1e30; color: #e0e0e0; border: 1px solid #2a2a40;
  }
  #patternToggle.active {
    background: rgba(83, 109, 254, 0.2); border-color: #536dfe; color: #536dfe;
  }
  #patternToggle:hover { background: #2a2a40; }
  #drawBtn {
    background: linear-gradient(135deg, #536dfe, #64ffda); color: #0a0a0f;
  }
  #drawBtn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(83, 109, 254, 0.3); }
  #drawBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  #resetBtn {
    background: #1e1e30; color: #e0e0e0; border: 1px solid #2a2a40;
  }
  #resetBtn:hover { background: #2a2a40; }
  .progress-bar {
    width: 100%; height: 3px; background: #12121a;
    margin: 0 16px 8px; max-width: 700px; border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #536dfe, #64ffda);
    transition: width 0.1s linear;
  }
  footer { padding: 8px; font-size: 0.7rem; color: #333; }

  /* ── Mobile: stack vertically, canvas first ── */
  @media (max-width: 750px) {
    .content {
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #canvas-wrap {
      width: 96vw !important;
      max-width: 400px;
      order: 1;
    }
    #patternPanel {
      width: 96vw !important;
      max-width: 400px;
      order: 2;
    }
  }
</style>
</head>
<body>
<header>
  <h1>Dragon Curve Fractal Generator</h1>
  <p class="subtitle">Explore the self-similar beauty of the Heighway dragon</p>
  <div class="stats">
    Iteration: <span id="iterDisplay">0</span> &nbsp;|&nbsp;
    Segments: <span id="segDisplay">0</span> &nbsp;|&nbsp;
    Angle: <span id="angleDisplay">90</span>°
  </div>
</header>

<div class="content">
  <!-- Pattern Editor -->
  <div id="patternPanel">
    <div class="pe-section">
      <span class="pe-label">Fold Angle</span>
      <div class="pe-row">
        <input type="range" id="angleSlider" min="1" max="179" value="90" style="flex:1; min-width: 120px;">
        <span class="pe-angle-val" id="angleVal">90°</span>
      </div>
    </div>
    <div class="pe-section">
      <span class="pe-label">Turn Sequence</span>
      <div class="pe-seq-wrap" id="turnSeqWrap"></div>
    </div>
    <div class="pe-section">
      <span class="pe-label">Presets</span>
      <div class="pe-presets" id="presetsRow"></div>
    </div>
    <div class="pe-section">
      <div class="pe-preview-area">
        <canvas id="previewCanvas" width="228" height="152"></canvas>
        <div class="pe-preview-info">
          <div class="pe-detail" id="previewDetail">Angle: 90° | Seq: [R]</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <canvas id="mainCanvas"></canvas>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="controls">
  <div class="control-group">
    <label>Iterations</label>
    <input type="range" id="iterSlider" min="1" max="20" value="10">
    <div class="val" id="iterVal">10</div>
  </div>
  <div class="control-group">
    <label>Speed</label>
    <input type="range" id="speedSlider" min="1" max="50" value="15">
    <div class="val" id="speedVal">15</div>
  </div>
  <div class="control-group">
    <label>Color</label>
    <input type="color" id="colorPicker" value="#64ffda">
  </div>
  <div class="control-group" style="flex-direction:row; gap:8px; align-self:flex-end;">
    <button id="patternToggle">⚙ Pattern Mode</button>
    <button id="drawBtn">▶ Draw</button>
    <button id="resetBtn">↺ Reset</button>
  </div>
</div>

<footer>Built with Canvas API • No external dependencies</footer>

<script>
(() => {
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  const iterSlider = document.getElementById('iterSlider');
  const speedSlider = document.getElementById('speedSlider');
  const colorPicker = document.getElementById('colorPicker');
  const iterVal = document.getElementById('iterVal');
  const speedVal = document.getElementById('speedVal');
  const iterDisplay = document.getElementById('iterDisplay');
  const segDisplay = document.getElementById('segDisplay');
  const angleDisplayEl = document.getElementById('angleDisplay');
  const progressFill = document.getElementById('progressFill');
  const drawBtn = document.getElementById('drawBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Pattern editor
  const patternPanel = document.getElementById('patternPanel');
  const patternToggle = document.getElementById('patternToggle');
  const angleSlider = document.getElementById('angleSlider');
  const angleVal = document.getElementById('angleVal');
  const turnSeqWrap = document.getElementById('turnSeqWrap');
  const presetsRow = document.getElementById('presetsRow');
  const previewCanvas = document.getElementById('previewCanvas');
  const previewCtx = previewCanvas.getContext('2d');
  const previewDetail = document.getElementById('previewDetail');

  let animId = null;
  let turns = [];
  let fullSegments = [];

  // Single source of truth for pattern
  let patternMode = false;
  let foldAngle = 90;
  let baseTurns = [1];

  const presets = [
    { name: '🐉 Dragon', angle: 90, turns: [1] },
    { name: '🌿 Fern', angle: 60, turns: [1, -1] },
    { name: '❄️ Snowflake', angle: 120, turns: [1] },
    { name: '🔀 Zigzag', angle: 90, turns: [1, 1, -1] },
  ];

  // ── Canvas sizing ──
  function resizeCanvas() {
    const vw = window.innerWidth;
    const isMobile = vw <= 750;
    const isPanelVisible = patternPanel.classList.contains('visible');
    let w, h;

    if (isMobile) {
      // Mobile: canvas gets generous width, fixed aspect
      w = Math.min(vw * 0.92, 400);
      h = Math.round(w * 0.75);
    } else if (isPanelVisible) {
      // Desktop with panel: canvas takes remaining width
      w = Math.min(vw - 320, 800);
      h = Math.min(w * 0.75, 560);
    } else {
      // Desktop no panel: centered large canvas
      w = Math.min(vw - 48, 800);
      h = Math.min(w * 0.75, 600);
    }

    w = Math.max(280, w);
    h = Math.max(200, h);

    canvas.width = w * 2;
    canvas.height = h * 2;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    wrap.style.width = w + 'px';
  }

  // ── Curve math ──
  function computeTurns(n, baseSeq) {
    const t = [];
    for (let i = 0; i < n; i++) {
      const prev = t.slice();
      const foldTurn = baseSeq[i % baseSeq.length];
      t.push(foldTurn);
      for (let j = prev.length - 1; j >= 0; j--) t.push(-prev[j]);
    }
    return t;
  }

  function computeSegments(turnsArr, angleDeg) {
    const segs = [];
    let x = 0, y = 0, angle = 0;
    const rad = angleDeg * Math.PI / 180;
    let x2 = x + 1, y2 = y;
    segs.push({ x1: x, y1: y, x2, y2 });
    x = x2; y = y2;
    for (const turn of turnsArr) {
      angle += turn * rad;
      x2 = x + Math.cos(angle);
      y2 = y + Math.sin(angle);
      segs.push({ x1: x, y1: y, x2, y2 });
      x = x2; y = y2;
    }
    return segs;
  }

  function getBounds(segs) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const s of segs) {
      if (s.x1 < minX) minX = s.x1; if (s.y1 < minY) minY = s.y1;
      if (s.x2 < minX) minX = s.x2; if (s.y2 < minY) minY = s.y2;
      if (s.x1 > maxX) maxX = s.x1; if (s.y1 > maxY) maxY = s.y1;
      if (s.x2 > maxX) maxX = s.x2; if (s.y2 > maxY) maxY = s.y2;
    }
    return { minX, minY, maxX, maxY };
  }

  function hexToRgb(hex) {
    return {
      r: parseInt(hex.slice(1, 3), 16),
      g: parseInt(hex.slice(3, 5), 16),
      b: parseInt(hex.slice(5, 7), 16),
    };
  }

  function clear() {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBtn.disabled = false;
    progressFill.style.width = '0%';
  }

  // ── Drawing ──
  function drawStatic(segs, color) {
    clear();
    const b = getBounds(segs);
    const pad = 20;
    const w = canvas.width - pad * 2;
    const h = canvas.height - pad * 2;
    const rangeX = b.maxX - b.minX || 1;
    const rangeY = b.maxY - b.minY || 1;
    const scale = Math.min(w / rangeX, h / rangeY);
    const offX = pad + (w - rangeX * scale) / 2 - b.minX * scale;
    const offY = pad + (h - rangeY * scale) / 2 - b.minY * scale;
    const rgb = hexToRgb(color);

    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, scale * 0.4);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = `rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`;
    ctx.shadowBlur = 4;

    ctx.beginPath();
    for (const s of segs) {
      ctx.moveTo(s.x1 * scale + offX, s.y1 * scale + offY);
      ctx.lineTo(s.x2 * scale + offX, s.y2 * scale + offY);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function animateDraw(segs, color, speed) {
    clear();
    const b = getBounds(segs);
    const pad = 20;
    const w = canvas.width - pad * 2;
    const h = canvas.height - pad * 2;
    const rangeX = b.maxX - b.minX || 1;
    const rangeY = b.maxY - b.minY || 1;
    const scale = Math.min(w / rangeX, h / rangeY);
    const offX = pad + (w - rangeX * scale) / 2 - b.minX * scale;
    const offY = pad + (h - rangeY * scale) / 2 - b.minY * scale;
    const rgb = hexToRgb(color);

    const total = segs.length;
    const segsPerFrame = Math.max(1, Math.round(speed * (total / 500)));
    let idx = 0;

    ctx.lineWidth = Math.max(1, scale * 0.4);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function frame() {
      const end = Math.min(idx + segsPerFrame, total);

      // Redraw completed portion dim
      if (idx > 0) {
        ctx.shadowBlur = 0;
        ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.25)`;
        ctx.beginPath();
        for (let i = 0; i < idx; i++) {
          const s = segs[i];
          ctx.moveTo(s.x1 * scale + offX, s.y1 * scale + offY);
          ctx.lineTo(s.x2 * scale + offX, s.y2 * scale + offY);
        }
        ctx.stroke();
      }

      // Draw active portion bright
      ctx.shadowColor = `rgba(${rgb.r},${rgb.g},${rgb.b},0.7)`;
      ctx.shadowBlur = 8;
      ctx.strokeStyle = color;
      ctx.beginPath();
      for (let i = idx; i < end; i++) {
        const s = segs[i];
        ctx.moveTo(s.x1 * scale + offX, s.y1 * scale + offY);
        ctx.lineTo(s.x2 * scale + offX, s.y2 * scale + offY);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Glow tip
      if (end < total) {
        const tip = segs[end - 1] || segs[0];
        const cx = tip.x2 * scale + offX;
        const cy = tip.y2 * scale + offY;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 12);
        grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.8)`);
        grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, 12, 0, Math.PI * 2);
        ctx.fill();
      }

      idx = end;
      iterDisplay.textContent = Math.min(turns.length, Math.floor((idx / total) * turns.length));
      segDisplay.textContent = idx.toLocaleString();
      progressFill.style.width = ((idx / total) * 100).toFixed(1) + '%';

      if (idx < total) {
        animId = requestAnimationFrame(frame);
      } else {
        iterDisplay.textContent = turns.length;
        drawBtn.disabled = false;
        progressFill.style.width = '100%';
      }
    }

    drawBtn.disabled = true;
    animId = requestAnimationFrame(frame);
  }

  // ── Preview ──
  function drawPreview(angle, tArr) {
    const segs = computeSegments(computeTurns(4, tArr), angle);
    const b = getBounds(segs);
    const pad = 8;
    const w = previewCanvas.width - pad * 2;
    const h = previewCanvas.height - pad * 2;
    const rangeX = b.maxX - b.minX || 1;
    const rangeY = b.maxY - b.minY || 1;
    const scale = Math.min(w / rangeX, h / rangeY);
    const offX = pad + (w - rangeX * scale) / 2 - b.minX * scale;
    const offY = pad + (h - rangeY * scale) / 2 - b.minY * scale;

    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    previewCtx.strokeStyle = '#64ffda';
    previewCtx.lineWidth = Math.max(0.8, scale * 0.35);
    previewCtx.lineCap = 'round';
    previewCtx.lineJoin = 'round';

    previewCtx.beginPath();
    for (const s of segs) {
      previewCtx.moveTo(s.x1 * scale + offX, s.y1 * scale + offY);
      previewCtx.lineTo(s.x2 * scale + offX, s.y2 * scale + offY);
    }
    previewCtx.stroke();

    previewDetail.textContent = `Angle: ${angle}° | Seq: [${tArr.map(t => t === 1 ? 'R' : 'L').join(', ')}]`;
  }

  // ── Turn sequence UI ──
  function renderTurnSequence() {
    turnSeqWrap.innerHTML = '';
    baseTurns.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.className = 'pe-turn ' + (t === 1 ? 'right' : 'left');
      btn.textContent = t === 1 ? 'R' : 'L';
      btn.addEventListener('click', () => {
        baseTurns[i] = baseTurns[i] === 1 ? -1 : 1;
        renderTurnSequence();
        updatePreview();
        autoApply();
      });
      turnSeqWrap.appendChild(btn);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'pe-add';
    addBtn.textContent = '+';
    addBtn.addEventListener('click', () => {
      baseTurns.push(1);
      renderTurnSequence();
      updatePreview();
      autoApply();
    });
    turnSeqWrap.appendChild(addBtn);

    if (baseTurns.length > 1) {
      const removeBtn = document.createElement('button');
      removeBtn.className = 'pe-remove';
      removeBtn.textContent = '−';
      removeBtn.addEventListener('click', () => {
        baseTurns.pop();
        renderTurnSequence();
        updatePreview();
        autoApply();
      });
      turnSeqWrap.appendChild(removeBtn);
    }
  }

  // ── Presets ──
  function renderPresets() {
    presetsRow.innerHTML = '';
    presets.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'pe-preset';
      btn.textContent = p.name;
      btn.addEventListener('click', () => {
        foldAngle = p.angle;
        baseTurns = p.turns.slice();
        angleSlider.value = foldAngle;
        angleVal.textContent = foldAngle + '°';
        renderTurnSequence();
        updatePreview();
        autoApply();
      });
      presetsRow.appendChild(btn);
    });
  }

  function updatePreview() {
    drawPreview(foldAngle, baseTurns);
  }

  // ── Auto-apply: compute and draw on main canvas (static, instant) ──
  function autoApply() {
    if (!patternMode) return;
    const iter = parseInt(iterSlider.value);
    const color = colorPicker.value;
    const angle = foldAngle;
    const baseSeq = baseTurns;

    turns = computeTurns(iter, baseSeq);
    fullSegments = computeSegments(turns, angle);
    angleDisplayEl.textContent = angle;
    segDisplay.textContent = fullSegments.length.toLocaleString();
    iterDisplay.textContent = turns.length;
    progressFill.style.width = '100%';

    drawStatic(fullSegments, color);
  }

  // ── Main draw (animated) ──
  function start() {
    const iter = parseInt(iterSlider.value);
    const speed = parseInt(speedSlider.value);
    const color = colorPicker.value;
    const angle = patternMode ? foldAngle : 90;
    const baseSeq = patternMode ? baseTurns : [1];

    clear();
    turns = computeTurns(iter, baseSeq);
    fullSegments = computeSegments(turns, angle);

    angleDisplayEl.textContent = angle;
    segDisplay.textContent = '0';
    iterDisplay.textContent = '0';
    progressFill.style.width = '0%';

    animateDraw(fullSegments, color, speed);
  }

  // ── Pattern toggle ──
  patternToggle.addEventListener('click', () => {
    patternMode = !patternMode;
    patternPanel.classList.toggle('visible', patternMode);
    patternToggle.classList.toggle('active', patternMode);
    resizeCanvas();

    if (patternMode) {
      // Entering pattern mode: show current pattern on canvas
      autoApply();
    } else {
      // Exiting: keep using current foldAngle/baseTurns (don't reset)
      // Just redraw with those settings
      start();
    }
  });

  // ── Angle slider ──
  let redrawTimer = null;
  angleSlider.addEventListener('input', () => {
    foldAngle = parseInt(angleSlider.value);
    angleVal.textContent = foldAngle + '°';
    updatePreview();
    clearTimeout(redrawTimer);
    redrawTimer = setTimeout(() => autoApply(), 150);
  });

  // ── Init ──
  renderTurnSequence();
  renderPresets();
  updatePreview();

  iterSlider.addEventListener('input', () => { iterVal.textContent = iterSlider.value; });
  speedSlider.addEventListener('input', () => { speedVal.textContent = speedSlider.value; });
  drawBtn.addEventListener('click', start);
  resetBtn.addEventListener('click', () => {
    clear();
    iterDisplay.textContent = '0';
    segDisplay.textContent = '0';
    angleDisplayEl.textContent = patternMode ? foldAngle : '90';
  });

  window.addEventListener('resize', () => { resizeCanvas(); start(); });
  resizeCanvas();

  // Auto-draw on page load
  start();
})();
</script>
</body>
</html>
